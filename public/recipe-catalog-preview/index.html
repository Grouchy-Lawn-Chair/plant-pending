<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Pending Recipe Catalog</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#0f141b;color:#eef2f7;font-family:Inter,Arial,sans-serif}.shell{min-height:100vh;display:grid;grid-template-columns:360px 1fr}.side{padding:24px;border-right:1px solid #29313a;background:#151b23}.main{padding:28px}.eyebrow{text-transform:uppercase;letter-spacing:.18em;font-size:11px;color:#8ea0b3}.muted{color:#97a6b4;line-height:1.45}.back{display:inline-block;margin-bottom:20px;color:#c7d2dc;text-decoration:none}.brand{font-size:28px;font-weight:800;margin:5px 0}.control{margin-top:16px}.control label{display:block;margin-bottom:6px}.select{width:100%;padding:12px;border-radius:12px;border:1px solid #3a4652;background:#0e141a;color:#fff}.card{border:1px solid #303a45;background:#151c24;border-radius:18px;padding:18px}.recipe-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}.source-pill{border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800;border:1px solid #475569;background:#111827}.plants{display:grid;gap:12px;margin-top:18px}.plant{display:grid;grid-template-columns:1fr auto;gap:12px;border:1px solid #303a45;background:#10171e;border-radius:14px;padding:14px}.name{font-weight:700}.meta{font-size:12px;color:#98a8b7;margin-top:5px}.match{font-size:12px;color:#dbe5ec;margin-top:8px}.rationale{font-size:11px;color:#95a4b2;margin-top:6px;line-height:1.4}.pill{height:max-content;border-radius:999px;padding:5px 9px;font-size:10px;font-weight:700;border:1px solid #4b5563}.verified{color:#a7f3d0;background:#064e3b55;border-color:#10b98166}.pending{color:#cbd5e1;background:#111827}.safe{margin-top:18px;border:1px solid #14532d;background:#052e164f;border-radius:14px;padding:14px;color:#bbf7d0}.pending-note{margin-top:18px;border:1px solid #5b4d91;background:#241e3e;border-radius:14px;padding:14px;color:#d8cffd}.counts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}.count{border:1px solid #303a45;background:#10171e;border-radius:12px;padding:12px}.count strong{display:block;font-size:20px}.count span{font-size:11px;color:#95a4b2}@media(max-width:800px){.shell{display:block}.side{border-right:0;border-bottom:1px solid #29313a}.recipe-head{display:block}.source-pill{display:inline-block;margin-top:8px}}
  </style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <a class="back" href="../">← Back to Plant Pending</a>
    <div class="eyebrow">Plant Pending</div>
    <div class="brand">Plant recipes</div>
    <p class="muted">Gardenia and Monrovia now live in one recipe catalog. Gardenia uses the completed safer Green Acres substitutions. Monrovia matching is the next data pass.</p>
    <div class="counts">
      <div class="count"><strong id="recipe-count">17</strong><span>recipes</span></div>
      <div class="count"><strong id="plant-count">83</strong><span>plant entries</span></div>
    </div>
    <div class="control"><label class="eyebrow" for="source">Source</label><select class="select" id="source"><option value="all">All recipes</option><option value="Gardenia">Gardenia</option><option value="Monrovia">Monrovia</option></select></div>
    <div class="control"><label class="eyebrow" for="recipe">Recipe</label><select class="select" id="recipe"></select></div>
  </aside>
  <main class="main"><div id="detail"></div></main>
</div>
<script>
const g=(name,plants)=>({source:'Gardenia',name,status:'verified',plants:plants.map(p=>({original:p[0],match:p[1],id:p[2],type:p[3],score:p[4],role:p[5],rationale:p[6]}))});
const m=(name,plants)=>({source:'Monrovia',name,status:'pending',plants:plants.map(p=>({original:p[0],coverage:p[1],layer:p[2],width:p[3]}))});
const recipes=[
g('A Contemporary Provencal Courtyard',[
['Chinese Silver Grass','Deer Grass',811,'Safer functional grass substitute',85,'Tall airy ornamental grass','Large clumping California native grass preserves the tall airy structure without Miscanthus.'],
["English Lavender 'Thumbelina Leigh'",'Fruity Germander',860,'Safer low flowering substitute',65,'Low compact purple edging','Low waterwise flowering mound without woody lavender and heavy bee activity.']]),

["Sweet Alyssum 'Snow Princess'",'Silver Carpet',343,'Safer foliage edging substitute',68,'White trailing front edge','Pale low groundcover without alyssum reseeding and heavy bee activity.']]),
g('Brilliant Summer Border with Crocosmia, Dahlia and Canna',[

g('A Successful Marriage',[
['Mexican Feather Grass','Northern Lights Tufted Hair Grass',399,'Functional grass substitute',78,'Fine moving grass','Compact fine-textured grass with movement and no Mexican feather grass concern.'],
["English Lavender 'Hidcote'",'Fruity Germander',860,'Safer low flowering substitute',62,'Purple fragrant mound','Compact flowering mound without woody lavender and heavy bee activity.'],
['Lavender Cotton','Blue Fescue',277,'Safer silver-blue mound substitute',72,'Silver evergreen mound','Tidy clumping blue mound without Santolina splitting and shaping needs.']]),
g('A Pretty Mediterranean Border Idea',[
["English Lavender 'Hidcote'",'Fruity Germander',860,'Safer low flowering substitute',62,'Purple front mound','Compact flowering mound without woody lavender and heavy bee activity.'],
["Agapanthus 'Northern Star'","Lily of the Nile 'Storm Cloud'",937,'Close cultivar, same genus',82,'Blue vertical flowers','Same strappy foliage and dark blue summer flower role, but larger.'],
['Green Santolina','Blue Fescue',277,'Safer silver-blue mound substitute',70,'Aromatic mound','Tidy clump without woody splitting and repeated shearing.'],
["African Daisy 'Flame'",'Bright Lights Horizon Sunset African Daisy',285,'Close functional match',88,'Low orange flowers','Very similar warm daisy flowers and low landscape role.'],
["Blanket Flower 'Arizona Sun'",'Bright Lights Horizon Sunset African Daisy',285,'Functional substitute',77,'Red-yellow daisy mound','Preserves warm daisy color and low mound.'],
["Crocosmia 'Lucifer'","Bottlebrush 'Little John'",729,'Safer red flowering substitute',60,'Tall scarlet accent','Reliable compact red accent replacing spreading Crocosmia and kangaroo paw.'],
["Woodland Sage 'Caradonna'","Coast Rosemary 'Blue Gem'",781,'Safer blue flowering substitute',66,'Purple vertical flowers','Low-water blue flowering shrub without Russian sage suckering.'],
["Coreopsis 'Moonbeam'","Coreopsis 'Nana'",312,'Close genus match',86,'Soft yellow airy mound','Same yellow Coreopsis effect at a lower scale.']]),
g('A Lovely Backyard Retreat with Achillea, Festuca and Grasses',[
["Yarrow 'Terracotta'","Yarrow 'Little Moonshine'",574,'Close genus match',77,'Peach-orange flat flowers','Same yarrow habit with yellow rather than terracotta flowers.'],
["Yarrow 'Summer Pastels'","Yarrow 'Little Moonshine'",574,'Close genus match',74,'Pastel flat flowers','Same yarrow form but loses the mixed pastel palette.'],
["Blue Fescue 'Elijah Blue'",'Blue Fescue',277,'Near-exact species match',96,'Compact blue grass mound','Nearly identical form and scale.'],
["New Zealand Hair Sedge 'Frosted Curls'",'Northern Lights Tufted Hair Grass',399,'Safer close grass substitute',88,'Fine pale curling grass','Fine compact pale grass with no major spreading concern.']]),
g('Native Desert Pollinator Garden with Agave and Sage',[
['Artichoke Agave',"Lomandra 'Lime Tuff'",444,'Safer soft architectural substitute',55,'Blue architectural rosette','Soft architectural mound without agave terminal spines.'],
['Red Yucca',"Bottlebrush 'Little John'",729,'Safer red flowering shrub substitute',65,'Coral vertical accent','Compact drought-tolerant red flowers without stiff leaves and tall obstructive stalks.'],
['Autumn Sage',"Bottlebrush 'Little John'",729,'Functional shrub substitute',65,'Long-blooming red shrub','Similar compact evergreen flowering role at roughly the same scale.'],
['Blue Grama','Northern Lights Tufted Hair Grass',399,'Functional grass substitute',75,'Fine native grass','Similar compact fine-textured grass.'],
['Brittlebush',"Coreopsis 'Nana'",312,'Safer yellow daisy substitute',85,'Silver yellow-flowering mound','Low-water yellow daisy effect without rockrose.']]),
g('Butterfly-Friendly Garden Design',[
['Black-Eyed Susan',"Coreopsis 'Nana'",312,'Functional flower substitute',78,'Golden daisy mass','Preserves yellow daisy mass at a shorter scale.'],
['Blazing Star',"Coast Rosemary 'Blue Gem'",781,'Safer blue flowering substitute',55,'Purple vertical flowers','Blue flowers and pollinator value without Russian sage suckering.'],
['White Blazing Star',"Feather Reed Grass 'Karl Foerster'",370,'Structural substitute',50,'Tall pale vertical spikes','Preserves tall narrow pale plumes with ornamental grass.'],
["Sedum 'Autumn Joy'","Sedum 'Autumn Fire'",506,'Close cultivar',94,'Pink-to-rust mound','Very close stonecrop match.'],
["Blue Fescue 'Elijah Blue'",'Blue Fescue',277,'Near-exact species match',96,'Blue front edge','Nearly identical compact blue fescue.'],
["Butterfly Bush 'Black Knight'","Coast Rosemary 'Blue Gem'",781,'Safer flowering shrub substitute',72,'Tall purple shrub','Avoids unverified fertile butterfly bush.']]),
g('A Fabulous Planting Idea with Grasses and Sage',[
['Mexican Feather Grass','Northern Lights Tufted Hair Grass',399,'Functional grass substitute',78,'Fine flowing grass matrix','Compact fine-textured grass without Mexican feather grass concern.'],
["Woodland Sage 'Caradonna'","Coast Rosemary 'Blue Gem'",781,'Safer blue flowering substitute',66,'Purple flowering accent','Low-water blue flowers without Russian sage suckering.']]),
g("Salvia 'Caradonna' Plant Profile",[
["Woodland Sage 'Caradonna'","Coast Rosemary 'Blue Gem'",781,'Safer blue flowering substitute',66,'Compact purple perennial','Blue flowering substitute without aggressive spread.']]),
g('Summer-to-Fall Perennial Border with Coneflowers and Red Hot Pokers',[
["Red Hot Poker 'Timothy'","Bottlebrush 'Little John'",729,'Safer warm-color substitute',62,'Peach-salmon spikes','Compact red flowers replace drainage-sensitive kangaroo paw.'],
["Globe Thistle 'Veitch’s Blue'","Coast Rosemary 'Blue Gem'",781,'Safer blue flowering substitute',50,'Blue spherical flowers','Preserves blue flowering color without Russian sage.'],
["Daylily 'Stafford'",'Bright Lights Horizon Sunset African Daisy',285,'Safer warm flowering substitute',60,'Red-burgundy flowers','Warm red-orange color without stiff red-yucca foliage.'],
['Jerusalem Sage','Blue Fescue',277,'Safer cool foliage substitute',45,'Yellow tiered flowers','Tidy cool mound replaces spreading Lamb’s Ear.'],
['Purpletop Vervain','Firehouse Verbena',374,'Same genus, different habit',70,'Airy purple flowers','Keeps purple verbena flowers but is lower and more spreading.']]),
m('Elegant Privacy Hedge Border',[["Bloodstone Thrift",30,'front',12],["Early Evolution Hydrangea",30,'middle',24],["Eau de Parfum Blush Rose",25,'accent',48],["UpStanding Emerald Arborvitae",15,'back',96]]),
m('Modern Meadow',[["Northwind Switch Grass",14,'back',36],["Butterfly Weed",14,'middle',24],["Narrowleaf Milkweed",10,'middle',12],["Dark Matter Meadow Sage",16,'front',20],["Heavy Metal Blue Switch Grass",14,'middle',36],["Apex White Meadow Sage",10,'front',14],["Sunseekers Golden Sun Coneflower",11,'middle',16],["Sunseekers White Perfection Coneflower",11,'middle',16]]),
m('Hummingbird Oasis',[["Chateau de Chambord Rose of Sharon",22,'back',48],["Chapel Hill Yellow Lantana",17,'middle',36],["Pink Pearl Agastache",14,'middle',16],["Colorburst Rose Cape Fuchsia",18,'front',24],["Harlequin Pink Beardtongue",14,'front',16],["Colorburst Yellow Cape Fuchsia",15,'front',24]]),
m('Fire Pit',[["Little Darling Lilac",12,'accent',48],["Evolution Colorific Coneflower",14,'middle',18],["Scallywag Holly",14,'back',36],["Evolution Emerald Ice Sedum",12,'front',15],["Red Creeping Thyme",14,'front',18],["Dark Matter Meadow Sage",14,'middle',12],["Dark Knight Bluebeard",10,'middle',24],["Elijah Blue Fescue",10,'front',12]]),
m('Fenceline Flow',[["T-Rex Hosta",28,'middle',72],["Ryusen Weeping Japanese Maple",20,'accent',72],["Ice Dance Japanese Sedge",27,'front',24],["Northern Exposure Sienna Heuchera",25,'front',21]]),
m('Delightful and Drought-Tolerant',[["Summertime Blues Chaste Tree",18,'back',60],["Blonde Ambition Blue Grama Grass",30,'middle',36],["Sombrero Granada Gold Coneflower",24,'middle',24],["Rozanne Cranesbill",28,'front',24]])
];
const source=document.querySelector('#source'),select=document.querySelector('#recipe'),detail=document.querySelector('#detail');
function filtered(){return source.value==='all'?recipes:recipes.filter(r=>r.source===source.value)}
function rebuild(){const list=filtered();select.innerHTML='';list.forEach((r,i)=>{const o=document.createElement('option');o.value=String(recipes.indexOf(r));o.textContent=r.name;select.append(o)});select.value=String(recipes.indexOf(list[0]));render()}
function render(){const r=recipes[Number(select.value)]||filtered()[0];if(!r)return;const verified=r.status==='verified';detail.innerHTML=`<section class="card"><div class="recipe-head"><div><div class="eyebrow">Combined recipe catalog</div><h1>${r.name}</h1></div><span class="source-pill">${r.source}</span></div>${verified?'<div class="safe"><strong>Safety-reviewed Green Acres version</strong><br><span class="muted">All displayed Gardenia matches use verified Plant Pending catalog IDs. Previously flagged invasive, spreading, sharp, or difficult substitutes were removed where a safer option was available.</span></div>':'<div class="pending-note"><strong>Monrovia matching in progress</strong><br><span class="muted">The plant list, estimated coverage, and layer roles are loaded. Verified Green Acres matches and the invasive/spreading review come next.</span></div>'}<div class="plants">${r.plants.map(p=>verified?`<div class="plant"><div><div class="name">${p.original}</div><div class="match">→ ${p.match} <span class="muted">(Plant Pending ID ${p.id})</span></div><div class="meta">${p.role} · match score ${p.score}/100</div><div class="rationale">${p.rationale}</div></div><span class="pill verified">Verified</span></div>`:`<div class="plant"><div><div class="name">${p.original}</div><div class="meta">${p.coverage}% coverage · ${p.layer} · ${p.width}\" mature width</div><div class="match">Green Acres match and risk review: next pass</div></div><span class="pill pending">Pending</span></div>`).join('')}</div></section>`}
source.addEventListener('change',rebuild);select.addEventListener('change',render);rebuild();
</script>
</body>
</html>
