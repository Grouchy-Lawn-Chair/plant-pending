name: Patch back-attract colliders

on:
  push:
    branches:
      - phase-1-recipe-grid-lab

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip back-attract patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-1-recipe-grid-lab
      - name: Patch recipe lab
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('public/recipe-grid-lab/app.js')
          text = app.read_text()
          text = text.replace("VERSION='12.5.0'", "VERSION='12.6.0'", 1)
          text = text.replace('true-size sequential packing', 'seeded hedge colliders', 1)

          old_decl = "const cc=counts(state.plants,state.totalPlants),records=[],attempts=[],pruned=[],queue=[],opts="
          new_decl = "const cc=counts(state.plants,state.totalPlants),records=[],attempts=[],pruned=[],queue=[],hedgePlacements=[],opts="
          if old_decl not in text:
              raise SystemExit('generation declaration not found')
          text = text.replace(old_decl, new_decl, 1)

          old = "if(p.mode==='back-attract'){for(let i=0;i<n;i++){const vr=p.diameter/2,t=pointAcross(state.zone.backEdges.length?state.zone.backEdges:[0],(i+1)/(n+1),vr*.85);records.push({id:`${p.id}-${i+1}`,plantId:p.id,name:p.name,color:p.color,diameter:p.diameter,visualRadius:vr,physicsRadius:vr,x:t.x,y:t.y,mode:p.mode,fixed:true,dropIndex:null})}return}"
          new = "if(p.mode==='back-attract'){for(let i=0;i<n;i++){const vr=p.diameter/2,pr=radius(p),base=(i+1)/(n+1),alongJitter=(r()-.5)*Math.min(.08,.4/(n+1)),sample=Math.max(.02,Math.min(.98,base+alongJitter)),inwardJitter=r()*5,t=pointAcross(state.zone.backEdges.length?state.zone.backEdges:[0],sample,vr*.85+inwardJitter),body=Bodies.circle(t.x,t.y,pr,{isStatic:true,label:p.id,friction:.5,restitution:0});Composite.add(engine.world,body);records.push({id:`${p.id}-${i+1}`,plantId:p.id,name:p.name,color:p.color,diameter:p.diameter,visualRadius:vr,physicsRadius:pr,x:t.x,y:t.y,mode:p.mode,fixed:true,dropIndex:null,body});hedgePlacements.push({plantId:p.id,index:i+1,edge:t.edge,baseT:base,seededT:sample,alongJitter,inwardJitter,position:{x:t.x,y:t.y}})}return}"
          if old not in text:
              raise SystemExit('back-attract block not found')
          text = text.replace(old, new, 1)

          old_debug = "normalizedPlants:kept.map(x=>({...x,nx:x.x/CANVAS.width,ny:x.y/CANVAS.height})),pruned,attempts,actionLog:clone(actions)"
          new_debug = "normalizedPlants:kept.map(x=>({...x,nx:x.x/CANVAS.width,ny:x.y/CANVAS.height})),pruned,attempts,hedgePlacements,actionLog:clone(actions)"
          if old_debug not in text:
              raise SystemExit('debug payload location not found')
          text = text.replace(old_debug, new_debug, 1)
          app.write_text(text)

          index = Path('public/recipe-grid-lab/index.html')
          html = index.read_text()
          html = html.replace('Lab version 12.5.0 · true-size sequential packing', 'Lab version 12.6.0 · seeded hedge colliders')
          html = html.replace('./app.js?v=12.5.0', './app.js?v=12.6.0')
          index.write_text(html)

          Path('.github/workflows/patch-back-attract.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "plant-pending-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/recipe-grid-lab/app.js public/recipe-grid-lab/index.html .github/workflows/patch-back-attract.yml
          git commit -m "Add seeded back-attract colliders [skip back-attract patch]"
          git push origin HEAD:phase-1-recipe-grid-lab
