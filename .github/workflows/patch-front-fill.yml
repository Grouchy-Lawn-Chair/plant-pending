name: Patch front-fill attraction

on:
  push:
    branches:
      - phase-1-recipe-grid-lab

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip front-fill patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-1-recipe-grid-lab
      - name: Patch lab physics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('public/recipe-grid-lab/app.js')
          text = app.read_text()
          old = "function attract(engine){for(const b of Composite.allBodies(engine.world)){if(b.isStatic||!b.plugin?.frontFill)continue;const e=nearestSelected(b.position,state.zone.frontEdges);if(!e)continue;const dx=e.n.x-b.position.x,dy=e.n.y-b.position.y,l=Math.hypot(dx,dy)||1;Body.applyForce(b,b.position,{x:dx/l*b.mass*.000035,y:dy/l*b.mass*.000035})}}"
          new = "function attract(engine){const gx=engine.gravity.x*engine.gravity.scale,gy=engine.gravity.y*engine.gravity.scale;for(const b of Composite.allBodies(engine.world)){if(b.isStatic||!b.plugin?.frontFill)continue;Body.applyForce(b,b.position,{x:-gx*b.mass,y:-gy*b.mass});const e=nearestSelected(b.position,state.zone.frontEdges);if(!e)continue;const dx=e.n.x-b.position.x,dy=e.n.y-b.position.y,d=Math.hypot(dx,dy)||1;if(d>2){const strength=Math.min(.0024,.0007+d*.000006);Body.applyForce(b,b.position,{x:dx/d*b.mass*strength,y:dy/d*b.mass*strength})}}}"
          if old not in text:
              raise SystemExit('front-fill function not found')
          text = text.replace("VERSION='12.2.0'", "VERSION='12.3.0'", 1)
          text = text.replace('multi-edge zone physics', 'assigned front-edge pull', 1)
          text = text.replace(old, new, 1)
          app.write_text(text)

          index = Path('public/recipe-grid-lab/index.html')
          html = index.read_text()
          html = html.replace('Lab version 12.2.0 · multi-edge zone physics', 'Lab version 12.3.0 · assigned front-edge pull')
          html = html.replace('./app.js?v=12.2.0', './app.js?v=12.3.0')
          index.write_text(html)

          Path('.github/workflows/patch-front-fill.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "plant-pending-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/recipe-grid-lab/app.js public/recipe-grid-lab/index.html .github/workflows/patch-front-fill.yml
          git commit -m "Fix front-fill attraction [skip front-fill patch]"
          git push origin HEAD:phase-1-recipe-grid-lab
