name: Patch open-space fill

on:
  push:
    branches:
      - phase-1-recipe-grid-lab

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[skip open-space patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: phase-1-recipe-grid-lab
      - name: Patch lab
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('public/recipe-grid-lab/app.js')
          text = app.read_text()
          text = text.replace("VERSION='12.6.0'", "VERSION='12.7.0'", 1)
          text = text.replace("log:q('#action-log')};", "log:q('#action-log'),openFill:q('#open-space-fill')};", 1)
          text = text.replace("spacingPad:0,plants:", "spacingPad:0,openSpaceFill:'light',plants:", 1)
          text = text.replace("· seeded hedge colliders", "· open-space relaxation", 1)
          text = text.replace("els.pad.value=state.spacingPad;els.preset.value", "els.pad.value=state.spacingPad;els.openFill.value=state.openSpaceFill||'light';els.preset.value", 1)
          text = text.replace("state.spacingPad=Math.max(0,Math.min(20,+els.pad.value||0));", "state.spacingPad=Math.max(0,Math.min(20,+els.pad.value||0));state.openSpaceFill=els.openFill.value||'light';", 1)

          settle = "function settle(engine,max=2200){let quiet=0;for(let i=0;i<max;i++){attract(engine);Engine.update(engine,1000/120);const ok=Composite.allBodies(engine.world).filter(b=>!b.isStatic).every(b=>b.speed<.05&&b.angularSpeed<.05);quiet=ok?quiet+1:0;if(quiet>90)return i}return max}"
          helpers = settle + "\nfunction collisionSettle(engine,max=180){for(let i=0;i<max;i++)Engine.update(engine,1000/120)}\nfunction edgeDistance(p,poly){let d=Infinity;for(let i=0;i<poly.length;i++)d=Math.min(d,distance(p,poly[i],poly[(i+1)%poly.length]));return d}\nfunction circleFits(p,rad){if(!inside(p,state.zone.points)||edgeDistance(p,state.zone.points)<rad+2)return false;for(const e of state.exclusions){if(inside(p,e)||edgeDistance(p,e)<rad+2)return false}return true}\nfunction fillOpenSpaces(engine,records,r,level){const cfg={off:{moves:0,step:0},light:{moves:6,step:.22},medium:{moves:12,step:.3},strong:{moves:20,step:.38}}[level]||{moves:6,step:.22};const report={level,moved:0,candidates:0};if(!cfg.moves)return report;const movable=records.filter(x=>x.body&&!x.fixed&&x.mode!=='back-attract');if(!movable.length)return report;for(let pass=0;pass<cfg.moves;pass++){const bodies=Composite.allBodies(engine.world);let gap=null;for(let y=18;y<CANVAS.height;y+=18)for(let x=18;x<CANVAS.width;x+=18){const p={x:x+(r()-.5)*8,y:y+(r()-.5)*8};if(!inside(p,state.zone.points)||state.exclusions.some(e=>inside(p,e)))continue;let clearance=Infinity;for(const b of bodies){if(b.label?.startsWith('zone-wall'))continue;const br=b.circleRadius||0;clearance=Math.min(clearance,Math.hypot(p.x-b.position.x,p.y-b.position.y)-br)}if(!gap||clearance>gap.clearance)gap={...p,clearance}}if(!gap||gap.clearance<10)break;report.candidates++;const ranked=movable.map(rec=>{const d=Math.hypot(gap.x-rec.body.position.x,gap.y-rec.body.position.y),frontNear=state.zone.frontEdges.length?Math.min(...state.zone.frontEdges.map(i=>distance(gap,state.zone.points[i],state.zone.points[(i+1)%state.zone.points.length]))):0;let role=rec.mode==='scatter'?1:rec.mode==='stack'?.55:.72;if(rec.mode==='front-fill'&&frontNear>Math.max(90,rec.diameter*2.5))role=.08;return{rec,score:d*role}}).sort((a,b)=>b.score-a.score);let moved=false;for(const item of ranked){const rec=item.rec,b=rec.body,rad=b.circleRadius||rec.physicsRadius,ox=b.position.x,oy=b.position.y;for(const mult of [1,.75,.5,.3]){const nx=ox+(gap.x-ox)*cfg.step*mult+(r()-.5)*3,ny=oy+(gap.y-oy)*cfg.step*mult+(r()-.5)*3,p={x:nx,y:ny};if(!circleFits(p,rad))continue;let clear=true;for(const other of bodies){if(other===b||!other.circleRadius)continue;if(Math.hypot(nx-other.position.x,ny-other.position.y)<rad+other.circleRadius+1){clear=false;break}}if(!clear)continue;Body.setPosition(b,p);Body.setVelocity(b,{x:0,y:0});Body.setAngularVelocity(b,0);rec.x=nx;rec.y=ny;report.moved++;moved=true;break}if(moved)break}if(!moved)break;collisionSettle(engine,70)}collisionSettle(engine,140);return report}"
          if settle not in text:
              raise SystemExit('settle function not found')
          text = text.replace(settle, helpers, 1)

          text = text.replace("{isStatic:true,angle:Math.atan2(dy,dx),friction:.5,restitution:0}))}", "{isStatic:true,angle:Math.atan2(dy,dx),friction:.5,restitution:0,label:'zone-wall'}))}", 1)

          old = "});settle(engine,1400);records.filter(x=>x.body).forEach(x=>{x.x=x.body.position.x;x.y=x.body.position.y;delete x.body});const kept="
          new = "});settle(engine,1400);const openSpaceReport=fillOpenSpaces(engine,records,r,state.openSpaceFill);log('Open-space relaxation',`${openSpaceReport.level}: ${openSpaceReport.moved} plants moved`);records.filter(x=>x.body).forEach(x=>{x.x=x.body.position.x;x.y=x.body.position.y;delete x.body});const kept="
          if old not in text:
              raise SystemExit('final settle block not found')
          text = text.replace(old, new, 1)

          text = text.replace("spacingPad:state.spacingPad,canvas:CANVAS", "spacingPad:state.spacingPad,openSpaceFill:state.openSpaceFill,canvas:CANVAS", 1)
          text = text.replace("pruned,attempts,hedgePlacements,actionLog", "pruned,attempts,hedgePlacements,openSpaceReport,actionLog", 1)
          text = text.replace("· ${state.dropOrder} order</span>", "· ${state.dropOrder} order · open fill ${state.openSpaceFill}</span>", 1)
          text = text.replace("[els.total,els.order,els.physics,els.pad]", "[els.total,els.order,els.physics,els.pad,els.openFill]", 1)
          app.write_text(text)

          index = Path('public/recipe-grid-lab/index.html')
          html = index.read_text()
          html = html.replace('Lab version 12.6.0 · seeded hedge colliders', 'Lab version 12.7.0 · open-space relaxation')
          html = html.replace('<label>Random pad\n          <div class="inline-field"><input id="spacing-pad" type="number" min="0" max="20" value="0" /><span>px</span></div>\n        </label>', '<label>Random pad\n          <div class="inline-field"><input id="spacing-pad" type="number" min="0" max="20" value="0" /><span>px</span></div>\n        </label>\n        <label>Fill open spaces\n          <select id="open-space-fill">\n            <option value="off">Off</option>\n            <option value="light" selected>Light</option>\n            <option value="medium">Medium</option>\n            <option value="strong">Strong</option>\n          </select>\n        </label>')
          html = html.replace('./app.js?v=12.6.0', './app.js?v=12.7.0')
          html = html.replace('<li>Plant centers outside valid space are pruned</li>', '<li>Plant centers outside valid space are pruned</li>\n        <li>Open-space relaxation gently spreads movable plants into unused gaps</li>')
          index.write_text(html)

          Path('.github/workflows/patch-open-space-fill.yml').unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "plant-pending-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/recipe-grid-lab/app.js public/recipe-grid-lab/index.html .github/workflows/patch-open-space-fill.yml
          git commit -m "Add open-space relaxation [skip open-space patch]"
          git push origin HEAD:phase-1-recipe-grid-lab
